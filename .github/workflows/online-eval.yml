name: Online Promptfoo Eval

on:
  workflow_dispatch:
    inputs:
      dataset_url:
        description: "Online scenarios YAML/JSON/CSV URL. Falls back to EVAL_DATASET_URL secret."
        required: false
        type: string
      upload_results:
        description: "Share/upload Promptfoo results when PROMPTFOO_API_KEY is configured."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 19 * * *"

concurrency:
  group: online-eval-${{ github.ref }}
  cancel-in-progress: false

jobs:
  online-eval:
    name: Online dataset eval
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Dataset URL can come from manual input or repository secret.
      EVAL_DATASET_URL: ${{ inputs.dataset_url || secrets.EVAL_DATASET_URL }}
      EVAL_DATASET_TOKEN: ${{ secrets.EVAL_DATASET_TOKEN }}
      # Only used when upload_results=true.
      PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
      PROMPTFOO_CONFIG_DIR: /tmp/telecom-promptfoo
      PROMPTFOO_DISABLE_WAL_MODE: "true"
      PROMPTFOO_DISABLE_TELEMETRY: "true"
      PROMPTFOO_CACHE_ENABLED: "false"
      PROMPTFOO_VERSION: "0.121.17"
      npm_config_ignore_scripts: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync
        working-directory: backend

      - name: Fetch online eval dataset
        run: |
          set -euo pipefail
          if [ -z "${EVAL_DATASET_URL}" ]; then
            echo "EVAL_DATASET_URL is required. Set the workflow input or repository secret." >&2
            exit 1
          fi

          if [ -n "${EVAL_DATASET_TOKEN}" ]; then
            curl -fsSL -H "Authorization: Bearer ${EVAL_DATASET_TOKEN}" \
              "${EVAL_DATASET_URL}" \
              -o evals/online_scenarios.yaml
          else
            curl -fsSL "${EVAL_DATASET_URL}" -o evals/online_scenarios.yaml
          fi

          test -s evals/online_scenarios.yaml

      - name: Validate eval provider tests
        run: PYTHONPATH=. backend/.venv/bin/pytest -q evals

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run online Promptfoo eval
        run: |
          set -euo pipefail
          args=(eval -c promptfoo.online.yaml --no-progress-bar --output online-results.json)
          if [ "${{ inputs.upload_results || false }}" = "true" ] && [ -n "${PROMPTFOO_API_KEY}" ]; then
            args+=(--share)
          fi
          npx --yes promptfoo@${PROMPTFOO_VERSION} "${args[@]}"
        working-directory: evals

      - name: Upload online eval artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: online-promptfoo-results
          path: evals/online-results.json
          if-no-files-found: ignore
