services:
  postgres:
    image: postgres:16-alpine
    container_name: telecom_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-telecom_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000/api/v1}
    container_name: telecom_agent_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

# Backend chạy trên HOST bằng `make dev-backend` để có Docker CLI cho run_skill_script.
# Browser (trên host) gọi backend qua 127.0.0.1:8000.

volumes:
  postgres_app_data:
